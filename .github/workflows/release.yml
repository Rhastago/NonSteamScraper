name: Build & Release

# Builds the standalone binaries in a clean environment (no Flatpak sandbox) and
# attaches them to the GitHub Release whenever a version tag is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for the release job to upload assets

jobs:
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned to an older Ubuntu so the Linux binary keeps a low glibc floor
          # and runs on more distros (Steam Deck and beyond).
          - runs_on: ubuntu-22.04
            os_name: linux
            script: ./build_linux.sh
            built: dist/NonSteamScraper
            artifact: NonSteamScraper-linux
          - runs_on: windows-latest
            os_name: windows
            script: ./build_windows.sh
            built: dist/NonSteamScraper.exe
            artifact: NonSteamScraper-windows.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # tkinter ships with the Windows Python installer but not the Linux runner.
      - name: Install tkinter (Linux)
        if: matrix.os_name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Reuse the same build scripts you run locally, then give the artifact its
      # platform-specific release name.
      - name: Build
        shell: bash
        run: |
          chmod +x ${{ matrix.script }}
          ${{ matrix.script }}
          mv "${{ matrix.built }}" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
